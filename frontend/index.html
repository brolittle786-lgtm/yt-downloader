<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna YouTube Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .content {
            padding: 30px;
        }
        
        .url-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .url-input input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .url-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .url-input button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }
        
        .url-input button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }
        
        .url-input button:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        
        /* Video Info */
        .video-info {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            display: none;
        }
        
        .video-info.show {
            display: block;
        }
        
        .video-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2d3748;
        }
        
        .video-meta {
            display: flex;
            gap: 20px;
            color: #718096;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        /* Quality Grid */
        .quality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .quality-btn {
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .quality-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .quality-btn.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        
        .quality-resolution {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .quality-size {
            font-size: 0.8rem;
            opacity: 0.8;
        }
        
        /* Download Button */
        .download-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .download-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }
        
        .download-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        
        /* Status */
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .status.show {
            display: block;
        }
        
        .status.success {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status.error {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .status.info {
            background: #bee3f8;
            color: #2c5282;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            background: #f7fafc;
            border-top: 1px solid #e2e8f0;
            color: #718096;
        }
        
        .footer strong {
            color: #48bb78;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎥 Apna Downloader</h1>
            <p>FFmpeg se video + audio merge • 100% Working • Linux pe test kiya</p>
        </div>
        
        <div class="content">
            <div class="url-input">
                <input type="text" id="urlInput" placeholder="YouTube URL paste karo... (e.g., https://youtube.com/watch?v=...)" value="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
                <button onclick="processVideo()" id="processBtn">🔍 Process</button>
            </div>
            
            <div class="video-info" id="videoInfo">
                <div class="video-title" id="videoTitle"></div>
                <div class="video-meta">
                    <span id="videoDuration">⏱ --:--</span>
                    <span id="videoUploader">👤 --</span>
                </div>
                <div style="margin-top: 10px; color: #48bb78; font-weight: 600;">
                    ✅ FFmpeg available - Video + Audio merge hoga
                </div>
            </div>
            
            <div id="qualitySection" style="display: none;">
                <h3 style="margin-bottom: 15px; color: #2d3748;">📊 Quality chuno:</h3>
                <div class="quality-grid" id="qualityGrid"></div>
            </div>
            
            <button class="download-btn" id="downloadBtn" onclick="startDownload()" disabled>
                <span>⬇️ Download karo</span>
                <span style="font-size: 0.9rem;" id="downloadNote"></span>
            </button>
            
            <div class="status" id="status"></div>
        </div>
        
        <div class="footer">
            <p>⚡ <strong>FFmpeg active</strong> • Video aur audio automatically merge honge • Ek file mein sab kuch</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">Linux pe test kiya • Published with 💚</p>
        </div>
    </div>
    
    <script>
        let currentVideoTitle = '';
        let selectedFormat = null;
        
        function showStatus(message, type) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
        }
        
        async function processVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const processBtn = document.getElementById('processBtn');
            
            if (!url) {
                showStatus('❌ URL to daalo pehle', 'error');
                return;
            }
            
            processBtn.disabled = true;
            processBtn.textContent = '⏳ Processing...';
            
            try {
                const response = await fetch('http://localhost:3000/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showStatus('❌ ' + data.error, 'error');
                    return;
                }
                
                // Video info show karo
                currentVideoTitle = data.title;
                document.getElementById('videoTitle').textContent = data.title;
                document.getElementById('videoDuration').textContent = `⏱ ${formatDuration(data.duration)}`;
                document.getElementById('videoUploader').textContent = `👤 ${data.uploader || 'Unknown'}`;
                document.getElementById('videoInfo').classList.add('show');
                
                // Available formats show karo
                showFormats(data.formats);
                
                showStatus('✅ Video mil gaya! Quality chuno', 'success');
                
            } catch (error) {
                showStatus('❌ Server se connect nahi ho paya. Check karo backend chal raha hai?', 'error');
                console.error(error);
            } finally {
                processBtn.disabled = false;
                processBtn.textContent = '🔍 Process';
            }
        }
        
        function formatDuration(seconds) {
            if (!seconds) return '--:--';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            
            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
        
        function formatFileSize(bytes) {
            if (!bytes || bytes === 0) return 'Unknown size';
            const mb = bytes / (1024 * 1024);
            if (mb < 1000) return `${mb.toFixed(1)} MB`;
            return `${(mb / 1024).toFixed(1)} GB`;
        }
        
        function showFormats(formats) {
            const grid = document.getElementById('qualityGrid');
            const qualitySection = document.getElementById('qualitySection');
            
            grid.innerHTML = '';
            
            if (!formats || formats.length === 0) {
                qualitySection.style.display = 'none';
                return;
            }
            
            formats.forEach((format, index) => {
                const btn = document.createElement('div');
                btn.className = 'quality-btn';
                
                let resolution = format.resolution || 'Unknown';
                let qualityText = format.quality || 'Standard';
                
                if (format.hasVideo && format.hasAudio) {
                    resolution += ' 🔥 Video+Audio';
                } else if (format.hasVideo && !format.hasAudio) {
                    resolution += ' 🎬 Video only';
                } else if (!format.hasVideo && format.hasAudio) {
                    resolution = '🎵 Audio Only';
                    qualityText = 'Best Audio';
                }
                
                btn.innerHTML = `
                    <div class="quality-resolution">${resolution}</div>
                    <div class="quality-size">${qualityText} • ${formatFileSize(format.filesize)}</div>
                `;
                
                btn.onclick = () => {
                    document.querySelectorAll('.quality-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedFormat = format;
                    
                    const downloadBtn = document.getElementById('downloadBtn');
                    downloadBtn.disabled = false;
                    
                    if (format.hasVideo && format.hasAudio) {
                        document.getElementById('downloadNote').textContent = '(Already merged)';
                    } else {
                        document.getElementById('downloadNote').textContent = '(FFmpeg merge karega)';
                    }
                };
                
                grid.appendChild(btn);
            });
            
            qualitySection.style.display = 'block';
        }
        
        async function startDownload() {
            if (!selectedFormat) {
                showStatus('❌ Pehle quality chuno', 'error');
                return;
            }
            
            const downloadBtn = document.getElementById('downloadBtn');
            downloadBtn.disabled = true;
            downloadBtn.innerHTML = '<span>⏳ Downloading...</span><span>FFmpeg merge kar raha hai...</span>';
            
            showStatus('⏳ Video download ho raha hai... FFmpeg audio+video merge karega', 'info');
            
            try {
                const response = await fetch('http://localhost:3000/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: document.getElementById('urlInput').value.trim(),
                        format_id: selectedFormat.format_id,
                        title: currentVideoTitle
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    showStatus('❌ ' + data.error, 'error');
                } else if (data.file) {
                    showStatus('✅ Download complete! File download ho rahi hai...', 'success');
                    
                    // File download karo
                    window.location.href = `http://localhost:3000/api/file/${encodeURIComponent(data.file)}`;
                } else {
                    showStatus('✅ ' + data.message, 'success');
                }
                
            } catch (error) {
                showStatus('❌ Download failed', 'error');
                console.error(error);
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<span>⬇️ Download karo</span><span id="downloadNote"></span>';
            }
        }
    </script>
</body>
</html>
